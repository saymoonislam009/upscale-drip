  {id:15,name:"Onyx Trench Coat",cat:"jacket",img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=700&q=85",price:5200,desc:"Double-breasted trench.",isNew:false,sizes:["S","M","L","XL"]},
  {id:16,name:"Structured Blazer - Camel",cat:"jacket",img:"https://images.unsplash.com/photo-1548778052-311f4bc2b502?w=700&q=85",price:3800,desc:"Sharp camel blazer.",isNew:false,sizes:["S","M","L","XL"]}

function norm(p){
  var szs = p.sizes;
  if(!Array.isArray(szs)){ try{ szs=JSON.parse(szs); }catch(e){ szs=['S','M','L','XL','XXL']; } }
  return {id:p.id, name:p.name||'', cat:p.cat||'', img:p.img||'', price:Number(p.price)||0, desc:p.description||p.desc||'', isNew:!!(p.isnew||p.isNew), sizes:szs};
}

var PRODUCTS = DEFAULTS.slice();
var cart=[], currentProd=null, selSize=null, qty=1, visCount=8, curFilter='all', slideIdx=0, slideTimer;

async function loadFromSupabase(){
  try{
    var r = await fetch(SB_URL+'/rest/v1/products?select=*&order=id.asc', {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    var data = await r.json();
    if(Array.isArray(data) && data.length > 0){ PRODUCTS = data.map(norm); return true; }
  }catch(e){ console.warn('Supabase:', e); }
  return false;
}

document.addEventListener('DOMContentLoaded', async function(){
  renderAll(); renderNew(); renderPanjabi();
  var ok = await loadFromSupabase();
  if(ok){ renderAll(); renderNew(); renderPanjabi(); }
  initNav(); initSearch(); initFilters(); initHamburger(); startSlider(); initScrollReveal();
  document.getElementById('loadMore').addEventListener('click', loadMore);
  document.getElementById('cartBtn').addEventListener('click', openCart);
});

function makeCard(p){
  var el = document.createElement('div');
  el.className = 'pcard reveal';
  el.innerHTML = '<div class="pcard__img"><img src="'+p.img+'" alt="'+p.name+'" loading="lazy"/>'+(p.isNew?'<span class="badge b-new">New</span>':'')+'<div class="pcard__ov"><button class="qv-btn">Quick View</button></div></div><div class="pcard__info"><h3>'+p.name+'</h3><p class="pcat">'+p.cat.charAt(0).toUpperCase()+p.cat.slice(1)+'</p><div class="pprices"><span class="pcur">&#2547;'+p.price.toLocaleString()+'</span></div></div>';
  el.querySelector('.qv-btn').addEventListener('click', function(e){ e.stopPropagation(); openModal(p); });
  el.addEventListener('click', function(){ openModal(p); });
  return el;
}

function renderNew(){
  var g=document.getElementById('newGrid'); if(!g)return; g.innerHTML='';
  PRODUCTS.filter(function(p){return p.isNew;}).forEach(function(p){g.appendChild(makeCard(p));});
  triggerReveal();
}
function renderAll(filter){
  if(filter!==undefined) curFilter=filter;
  var g=document.getElementById('allGrid'); if(!g)return; g.innerHTML='';
  var list=curFilter==='all'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===curFilter;});
  list.slice(0,visCount).forEach(function(p){g.appendChild(makeCard(p));});
  var lb=document.getElementById('loadMore'); if(lb) lb.style.display=list.length>visCount?'inline-flex':'none';
  triggerReveal();
}
function renderPanjabi(){
  var g=document.getElementById('panjabi-grid'); if(!g)return; g.innerHTML='';
  PRODUCTS.filter(function(p){return p.cat==='panjabi';}).forEach(function(p){g.appendChild(makeCard(p));});
  triggerReveal();
}
function loadMore(){ visCount+=4; renderAll(); }
function initFilters(){
  document.querySelectorAll('.fbtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active'); visCount=8; renderAll(btn.dataset.f);
    });
  });
}
function goSlide(n){ var sl=document.querySelectorAll('.hero__slide'),dt=document.querySelectorAll('.hero__dot'); if(!sl.length)return; sl[slideIdx].classList.remove('active'); if(dt[slideIdx])dt[slideIdx].classList.remove('active'); slideIdx=(n+sl.length)%sl.length; sl[slideIdx].classList.add('active'); if(dt[slideIdx])dt[slideIdx].classList.add('active'); }
function nextSlide(){ clearInterval(slideTimer); goSlide(slideIdx+1); startSlider(); }
function prevSlide(){ clearInterval(slideTimer); goSlide(slideIdx-1); startSlider(); }
function startSlider(){ slideTimer=setInterval(function(){goSlide(slideIdx+1);},5000); }
function openModal(p){
  currentProd=p; selSize=null; qty=1;
  document.getElementById('qtyNum').textContent=1;
  document.getElementById('modalImg').innerHTML='<img src="'+p.img+'" alt="'+p.name+'"/>';
  var tag=document.getElementById('modalTag');
  if(p.isNew){tag.textContent='New Arrival';tag.className='modal-tag b-new';}else{tag.textContent='';tag.className='modal-tag';}
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('mPrice').textContent='&#2547;'+p.price.toLocaleString();
  document.getElementById('mDesc').textContent=p.desc||'';
  var sg=document.getElementById('sizeGrid'); sg.innerHTML='';
  (p.sizes||['S','M','L','XL','XXL']).forEach(function(sz){
    var b=document.createElement('button'); b.className='sbtn'; b.textContent=sz;
    b.addEventListener('click',function(){document.querySelectorAll('.sbtn').forEach(function(x){x.classList.remove('sel');}); b.classList.add('sel'); selSize=sz;});
    sg.appendChild(b);
  });
  on('modalOverlay'); on('prodModal'); document.body.style.overflow='hidden';
}
function closeModal(){ off('modalOverlay'); off('prodModal'); document.body.style.overflow=''; }
function chQty(d){ qty=Math.max(1,Math.min(10,qty+d)); document.getElementById('qtyNum').textContent=qty; }
function addFromModal(){ if(!selSize){alert('Please select a size!');return;} addToCart(currentProd,selSize,qty); closeModal(); openCart(); }
function addToCart(prod,size,q){
  var ex=cart.find(function(i){return i.id===prod.id&&i.size===size;});
  if(ex) ex.qty+=q; else cart.push(Object.assign({},prod,{size:size,qty:q}));
  updateCart();
  var btn=document.getElementById('cartBtn'); btn.style.transform='scale(1.35)'; setTimeout(function(){btn.style.transform='';},300);
}
function updateCart(){
  var total=cart.reduce(function(s,i){return s+i.qty;},0);
  var badge=document.getElementById('cartCount'); badge.textContent=total; total>0?badge.classList.add('on'):badge.classList.remove('on');
  document.getElementById('cartItemCount').textContent=total+' item'+(total!==1?'s':'');
  var body=document.getElementById('cartItems'), foot=document.getElementById('cartFooter');
  if(!cart.length){ body.innerHTML='<div class="empty-msg">Your cart is empty</div>'; foot.style.display='none'; return; }
  foot.style.display='block'; body.innerHTML='';
  cart.forEach(function(item,i){
    var el=document.createElement('div'); el.className='citem';
    el.innerHTML='<div class="citem__img"><img src="'+item.img+'" alt="'+item.name+'"/></div><div class="citem__info"><h4>'+item.name+'</h4><p>Size: '+item.size+'</p><div class="citem__row"><div class="qty-ctrl"><button onclick="updQty('+i+',-1)">-</button><span>'+item.qty+'</span><button onclick="updQty('+i+',1)">+</button></div><button class="rm-btn" onclick="rmItem('+i+')">Remove</button></div></div><span class="cprice">&#2547;'+(item.price*item.qty).toLocaleString()+'</span>';
    body.appendChild(el);
  });
  document.getElementById('cartTotal').textContent='&#2547;'+cart.reduce(function(s,i){return s+i.price*i.qty;},0).toLocaleString();
}
function updQty(i,d){ cart[i].qty=Math.max(1,cart[i].qty+d); updateCart(); }
function rmItem(i){ cart.splice(i,1); updateCart(); }
function openCart(){ on('cartOverlay'); on('cartDrawer'); document.body.style.overflow='hidden'; }
function closeCart(){ off('cartOverlay'); off('cartDrawer'); document.body.style.overflow=''; }
function openCheckout(){
  if(!cart.length)return; closeCart();
  document.getElementById('orderSum').innerHTML=cart.map(function(i){return '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>'+i.name+' ('+i.size+') x'+i.qty+'</span><span>&#2547;'+(i.price*i.qty).toLocaleString()+'</span></div>';}).join('');
  document.getElementById('oTotal').textContent='&#2547;'+cart.reduce(function(s,i){return s+i.price*i.qty;},0).toLocaleString();
  on('coOverlay'); on('coModal'); document.body.style.overflow='hidden';
}
function closeCheckout(){ off('coOverlay'); off('coModal'); document.body.style.overflow=''; }
function placeOrder(e){ e.preventDefault(); closeCheckout(); cart=[]; updateCart(); on('sucOverlay'); on('sucModal'); document.body.style.overflow='hidden'; }
function closeSuc(){ off('sucOverlay'); off('sucModal'); document.body.style.overflow=''; }
function initHamburger(){
  var btn=document.getElementById('hamburger'); if(!btn)return;
  btn.addEventListener('click',function(e){ e.stopPropagation(); document.getElementById('sideMenu').classList.contains('on')?closeMenu():openMenu(); });
}
function openMenu(){ document.getElementById('sideMenu').classList.add('on'); document.getElementById('menuOverlay').classList.add('on'); var h=document.getElementById('hamburger'); if(h)h.classList.add('open'); document.body.style.overflow='hidden'; }
function closeMenu(){ document.getElementById('sideMenu').classList.remove('on'); document.getElementById('menuOverlay').classList.remove('on'); var h=document.getElementById('hamburger'); if(h)h.classList.remove('open'); document.body.style.overflow=''; }
function initSearch(){
  document.getElementById('searchToggle').addEventListener('click',function(){ on('searchBar'); setTimeout(function(){document.getElementById('searchInput').focus();},150); });
  document.getElementById('searchClose').addEventListener('click',function(){ off('searchBar'); });
  document.getElementById('searchInput').addEventListener('input',function(){
    var q=this.value.toLowerCase().trim();
    var g=document.getElementById('allGrid');
    if(!q){ renderAll(); return; }
    g.innerHTML='';
    PRODUCTS.filter(function(p){return p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);}).forEach(function(p){g.appendChild(makeCard(p));});
    document.getElementById('collection').scrollIntoView({behavior:'smooth'});
    triggerReveal();
  });
}
function initNav(){ window.addEventListener('scroll',function(){ document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>50); }); }
function initScrollReveal(){
  var obs=new IntersectionObserver(function(entries){ entries.forEach(function(e,i){ if(e.isIntersecting){ setTimeout(function(){e.target.classList.add('vis');},i*60); obs.unobserve(e.target); } }); },{threshold:0.06});
  document.querySelectorAll('.reveal:not(.vis)').forEach(function(el){obs.observe(el);});
}
function triggerReveal(){ setTimeout(initScrollReveal,80); }
function handleNL(e){ e.preventDefault(); document.getElementById('nlMsg').textContent="You're in. Welcome to the inner circle."; e.target.reset(); setTimeout(function(){document.getElementById('nlMsg').textContent='';},5000); }
function on(id){ var el=document.getElementById(id); if(el)el.classList.add('on'); }
function off(id){ var el=document.getElementById(id); if(el)el.classList.remove('on'); }
</script>
